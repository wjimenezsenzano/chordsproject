<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guitar Chord Detector</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 20px;
    }

    h2 {
        margin-bottom: 10px;
    }

    #controls {
        margin-bottom: 10px;
    }

    #board {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 20px;
        align-items: center;
    }

    .row {
        display: flex;
        align-items: center;
    }

    .label {
        width: 40px;
        font-weight: bold;
    }

    .rightLabel {
        width: 140px;
        text-align: left;
        margin-left: 10px;
        font-size: 13px;
        color: #555;
    }

    .string {
        display: grid;
        grid-template-columns: repeat(13, 50px);
        gap: 2px;
    }

    .fret {
        border: 1px solid #333;
        padding: 6px;
        cursor: pointer;
        user-select: none;
        font-size: 12px;
        transition: 0.1s;
    }

    .open {
        background: #ddd;
    }

    .mark {
        background: black;
        color: white;
    }

    /* 🎯 CHORD TONE COLORS */
    .root {
        background: #ff4d4d !important;
        color: white !important;
    }

    .third {
        background: #4d79ff !important;
        color: white !important;
    }

    .fifth {
        background: #4dff88 !important;
        color: black !important;
    }

    .markerRow {
        display: grid;
        grid-template-columns: repeat(13, 50px);
        justify-content: center;
        margin-top: 10px;
    }

    .marker {
        font-size: 14px;
        font-weight: bold;
        height: 20px;
    }

    #output {
        margin-top: 20px;
        white-space: pre-line;
        font-family: monospace;
    }

    input {
        padding: 8px;
        width: 260px;
    }

    button {
        padding: 8px 12px;
        cursor: pointer;
        margin-left: 5px;
    }
</style>
</head>

<body>

<h2>Interactive Guitar Chord Builder</h2>

<div id="controls">
    <input id="tabInput" placeholder="x02220 OR E,A,D,G,B,E">

    <button onclick="analyzeChord()">Analyze</button>
    <button onclick="changeTuning()">Change Tuning</button>
</div>

<div id="board"></div>

<div class="markerRow">
    <div class="marker">0</div>
    <div class="marker"></div>
    <div class="marker"></div>
    <div class="marker"></div>
    <div class="marker"></div>
    <div class="marker">5</div>
    <div class="marker"></div>
    <div class="marker">7</div>
    <div class="marker"></div>
    <div class="marker">9</div>
    <div class="marker"></div>
    <div class="marker"></div>
    <div class="marker">12</div>
</div>

<div id="output">Select at least 3 notes...</div>

<script src="./chordsDetector.js"></script>

<script>

// ---------------- TUNING ----------------
let displayTuning = ["E","B","G","D","A","E"];
let logicalTuning = ["E","A","D","G","B","E"];

// low → high
let selected = ["x","x","x","x","x","x"];

// ---------------- ROOT HELPERS ----------------
const chromatic = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

function interval(root, note) {
    return (note - root + 12) % 12;
}

// ---------------- BUILD FRETBOARD ----------------
function buildFretboard() {

    const board = document.getElementById("board");
    board.innerHTML = "";

    displayTuning.forEach((openNote, visualIndex) => {

        const row = document.createElement("div");
        row.className = "row";

        const label = document.createElement("div");
        label.className = "label";
        label.innerText = openNote;
        row.appendChild(label);

        const string = document.createElement("div");
        string.className = "string";

        for (let fret = 0; fret <= 12; fret++) {

            const div = document.createElement("div");
            div.className = "fret";

            if (fret === 0) div.classList.add("open");

            div.innerText = window.getNote(openNote, fret);

            div.addEventListener("click", () => {

                const logicalIndex = 5 - visualIndex;

                Array.from(string.children).forEach(f =>
                    f.classList.remove("mark","root","third","fifth")
                );

                if (selected[logicalIndex] == fret.toString()) {
                    selected[logicalIndex] = "x";
                    updateOutput();
                    return;
                }

                selected[logicalIndex] = String(fret);

                div.classList.add("mark");

                updateOutput();
            });

            string.appendChild(div);
        }

        row.appendChild(string);

        const rightLabel = document.createElement("div");
        rightLabel.className = "rightLabel";

        if (visualIndex === 0) rightLabel.innerText = "(top string)";
        if (visualIndex === 5) rightLabel.innerText = "(bottom string)";

        row.appendChild(rightLabel);

        board.appendChild(row);
    });
}

// ---------------- CHORD ANALYSIS ----------------
function analyzeChord() {

    const input = document.getElementById("tabInput").value.trim();

    try {

        selected = window.parseTab(input);

        syncUI();
        updateOutput();

    } catch (e) {
        alert(e.message);
    }
}

// ---------------- CHANGE TUNING ----------------
function changeTuning() {

    const input = document.getElementById("tabInput").value.trim();
    const parts = input.split(",");

    if (parts.length !== 6) {
        alert("Need 6 notes");
        return;
    }

    displayTuning = parts.map(n => n.trim().toUpperCase());
    logicalTuning = [...displayTuning].reverse();

    selected = ["x","x","x","x","x","x"];

    buildFretboard();
    updateOutput();
}

// ---------------- SYNC UI ----------------
function syncUI() {

    document.querySelectorAll(".fret").forEach(f =>
        f.classList.remove("mark","root","third","fifth")
    );

    const strings = document.querySelectorAll(".string");

    for (let i = 0; i < 6; i++) {

        if (selected[i] === "x") continue;

        const fret = parseInt(selected[i]);
        const visual = 5 - i;

        const cell = strings[visual].children[fret];

        if (cell) cell.classList.add("mark");
    }
}

// ---------------- CHORD TONE MARKING ----------------
function markChordTones(tab, chordRoot) {

    const notes = window.tabToOrderedNotes(tab, logicalTuning);

    const rootIdx = chromatic.indexOf(chordRoot);

    const intervals = notes.map(n =>
        interval(rootIdx, chromatic.indexOf(n))
    );

    const strings = document.querySelectorAll(".string");

    notes.forEach((note, i) => {

        const noteIdx = chromatic.indexOf(note);
        const iv = interval(rootIdx, noteIdx);

        let cls = "";

        if (iv === 0) cls = "root";
        else if (iv === 4 || iv === 3) cls = "third";
        else if (iv === 7) cls = "fifth";

        const logicalIndex = i;
        const visual = 5 - logicalIndex;

        const fret = parseInt(selected[logicalIndex]);

        if (!isNaN(fret)) {
            const cell = strings[visual].children[fret];
            if (cell && cls) cell.classList.add(cls);
        }
    });
}

// ---------------- OUTPUT ----------------
function updateOutput() {

    const output = document.getElementById("output");

    const tab = selected.join(",");

    const notes = window.tabToOrderedNotes(tab, logicalTuning);

    if (notes.length < 3) {
        output.innerText = "Select at least 3 notes...";
        return;
    }

    const chords = window.detectChord(tab, logicalTuning);

    const best = chords[0];

    let text =
        "Notes (low → high): " + notes.join(" → ") + "\n\n" +
        "Chords:\n";

    chords.slice(0, 5).forEach(c => {
        text += `${c.name} (${c.score.toFixed(2)})\n`;
    });

    output.innerText = text;

    if (best) {
        markChordTones(tab, best.name.split(/[^A-G#]/)[0]);
    }
}

// ---------------- INIT ----------------
buildFretboard();

</script>

</body>
</html>
