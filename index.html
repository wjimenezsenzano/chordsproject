<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guitar Chord Detector</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 20px;
    }

    h2 {
        margin-bottom: 10px;
    }

    :root {
        --label-width: 70px;
        --fret-width: 50px;
        --gap: 2px;
        --right-width: 140px;
    }

    #tuningControls {
        margin-bottom: 20px;
    }

    .tuningRow {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 12px;
        flex-wrap: wrap;
    }

    select {
        padding: 4px;
        font-size: 14px;
    }

    #board {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 20px;
        align-items: center;
    }

    .row {
        display: grid;
        grid-template-columns:
            var(--label-width)
            repeat(13, var(--fret-width))
            var(--right-width);

        gap: var(--gap);
        align-items: center;
    }

    .label {
        font-weight: bold;
        text-align: center;
    }

    .rightLabel {
        text-align: left;
        font-size: 13px;
        color: #555;
    }

    .string {
        display: contents;
    }

    .fret {
        width: var(--fret-width);
        height: 28px;
        border: 1px solid #333;

        display: flex;
        align-items: center;
        justify-content: center;

        cursor: pointer;
        user-select: none;

        font-size: 12px;
        box-sizing: border-box;
    }

    .open {
        background: #ddd;
    }

    .mark {
        background: black;
        color: white;
    }

    .markerRow {
        display: grid;
        grid-template-columns:
            var(--label-width)
            repeat(13, var(--fret-width))
            var(--right-width);

        gap: var(--gap);
        margin-top: 10px;
        justify-content: center;
    }

    .marker {
        font-size: 12px;
        font-weight: bold;
        height: 20px;

        display: flex;
        align-items: center;
        justify-content: center;
    }

    #output {
        margin-top: 20px;
        white-space: pre-line;
        font-family: monospace;
    }

    input {
        padding: 8px;
        width: 250px;
    }

    button {
        padding: 8px 12px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h2>Interactive Guitar Chord Builder</h2>

<div id="tuningControls">

    <h3>Tuning (low → high)</h3>

    <div class="tuningRow">

        <select class="tuningSelect" data-index="0"></select>
        <select class="tuningSelect" data-index="1"></select>
        <select class="tuningSelect" data-index="2"></select>
        <select class="tuningSelect" data-index="3"></select>
        <select class="tuningSelect" data-index="4"></select>
        <select class="tuningSelect" data-index="5"></select>

    </div>

</div>

<input id="tabInput" placeholder="e.g. x02220">
<button onclick="drawFromInput()">Analyze</button>

<div id="board"></div>

<!-- FRET NUMBERS -->
<div class="markerRow">

    <div></div>

    <div class="marker">0</div>
    <div class="marker">1</div>
    <div class="marker">2</div>
    <div class="marker">3</div>
    <div class="marker">4</div>
    <div class="marker">5</div>
    <div class="marker">6</div>
    <div class="marker">7</div>
    <div class="marker">8</div>
    <div class="marker">9</div>
    <div class="marker">10</div>
    <div class="marker">11</div>
    <div class="marker">12</div>

    <div></div>

</div>

<!-- DOTS -->
<div class="markerRow">

    <div></div>

    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>

    <div class="marker">•</div>

    <div></div>

    <div class="marker">•</div>

    <div></div>

    <div class="marker">•</div>

    <div></div>
    <div></div>

    <div class="marker">••</div>

    <div></div>

</div>

<div id="output">Select at least 3 notes...</div>

<script src="./chordsDetector.js"></script>

<script>

// =====================================
// NOTE OPTIONS
// =====================================

const NOTE_OPTIONS = [
    "C","C#","D","D#","E","F",
    "F#","G","G#","A","A#","B"
];

// =====================================
// TUNING
// logical = low → high
// display = top → bottom
// =====================================

let logicalTuning = ["E","A","D","G","B","E"];

function getDisplayTuning() {
    return [...logicalTuning].reverse();
}

// =====================================
// STATE
// =====================================

let selected = ["x","x","x","x","x","x"];

// =====================================
// BUILD TUNING DROPDOWNS
// =====================================

function buildTuningSelectors() {

    const selects =
        document.querySelectorAll(".tuningSelect");

    selects.forEach((select, index) => {

        select.innerHTML = "";

        NOTE_OPTIONS.forEach(note => {

            const option =
                document.createElement("option");

            option.value = note;
            option.innerText = note;

            if (note === logicalTuning[index]) {
                option.selected = true;
            }

            select.appendChild(option);
        });

        select.addEventListener("change", () => {

            logicalTuning[index] = select.value;

            buildFretboard();
            updateOutput();
        });
    });
}

// =====================================
// BUILD FRETBOARD
// =====================================

function buildFretboard() {

    const board =
        document.getElementById("board");

    board.innerHTML = "";

    const displayTuning = getDisplayTuning();

    displayTuning.forEach((openNote, visualStringIndex) => {

        const row =
            document.createElement("div");

        row.className = "row";

        // LABEL
        const label =
            document.createElement("div");

        label.className = "label";
        label.innerText = openNote;

        // STRING
        const string =
            document.createElement("div");

        string.className = "string";

        for (let fret = 0; fret <= 12; fret++) {

            const div =
                document.createElement("div");

            div.className = "fret";

            if (fret === 0) {
                div.classList.add("open");
            }

            div.innerText =
                window.getNote(openNote, fret);

            const logicalIndex =
                5 - visualStringIndex;

            // restore previous marks
            if (selected[logicalIndex] === String(fret)) {
                div.classList.add("mark");
            }

            div.addEventListener("click", () => {

                Array.from(string.children).forEach(f =>
                    f.classList.remove("mark")
                );

                if (selected[logicalIndex] === String(fret)) {

                    selected[logicalIndex] = "x";

                } else {

                    selected[logicalIndex] = String(fret);

                    div.classList.add("mark");
                }

                updateOutput();
            });

            string.appendChild(div);
        }

        // RIGHT LABEL
        const rightLabel =
            document.createElement("div");

        rightLabel.className = "rightLabel";

        if (visualStringIndex === 0) {
            rightLabel.innerText = "(top string)";
        }

        if (visualStringIndex === 5) {
            rightLabel.innerText = "(bottom string)";
        }

        row.appendChild(label);
        row.appendChild(string);
        row.appendChild(rightLabel);

        board.appendChild(row);
    });
}

// =====================================
// INPUT
// =====================================

function drawFromInput() {

    const input =
        document.getElementById("tabInput").value;

    try {

        const parsed =
            window.parseTab(input);

        selected = [...parsed];

        buildFretboard();

        updateOutput();

    } catch (e) {

        alert(e.message);
    }
}

// =====================================
// OUTPUT
// =====================================

function updateOutput() {

    const output =
        document.getElementById("output");

    const tab =
        selected.join(",");

    const notes =
        window.tabToOrderedNotes(
            tab,
            logicalTuning
        );

    if (notes.length < 3) {

        output.innerText =
            "Select at least 3 notes...";

        return;
    }

    const chords =
        window.detectChord(
            tab,
            logicalTuning
        );

    let text =
        "Tuning (low → high): " +
        logicalTuning.join(" ") +
        "\n\n" +

        "Tab (low → high): " +
        tab +
        "\n\n" +

        "Notes (low → high): " +
        notes.join(" → ") +
        "\n\n" +

        "Chords:\n";

    chords.slice(0, 5).forEach(c => {

        text +=
            `${c.name} (${c.score.toFixed(2)})\n`;
    });

    output.innerText = text;
}

// =====================================
// INIT
// =====================================

buildTuningSelectors();
buildFretboard();

</script>

</body>
</html>
