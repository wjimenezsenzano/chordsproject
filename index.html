<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guitar Chord Detector</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 20px;
    }

    h2 {
        margin-bottom: 10px;
    }

    :root {
        --label-width: 70px;
        --fret-width: 50px;
        --gap: 2px;
        --right-width: 140px;
    }

    #tuningControls {
        margin-bottom: 20px;
    }

    .tuningRow {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 12px;
        flex-wrap: wrap;
    }

    select {
        padding: 4px;
        font-size: 14px;
    }

    #board {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 20px;
        align-items: center;
    }

    .row {
        display: grid;
        grid-template-columns:
            var(--label-width)
            repeat(13, var(--fret-width))
            var(--right-width);

        gap: var(--gap);
        align-items: center;
    }

    .label {
        font-weight: bold;
        text-align: center;
    }

    .rightLabel {
        text-align: left;
        font-size: 13px;
        color: #555;
    }

    .string {
        display: contents;
    }

    .fret {
        width: var(--fret-width);
        height: 28px;
        border: 1px solid #333;

        display: flex;
        align-items: center;
        justify-content: center;

        cursor: pointer;
        user-select: none;

        font-size: 12px;
        box-sizing: border-box;
    }

    .open {
        background: #ddd;
    }

    .mark {
        background: black;
        color: white;
    }

    .markerRow {
        display: grid;
        grid-template-columns:
            var(--label-width)
            repeat(13, var(--fret-width))
            var(--right-width);

        gap: var(--gap);
        margin-top: 10px;
        justify-content: center;
    }

    .marker {
        font-size: 12px;
        font-weight: bold;
        height: 20px;

        display: flex;
        align-items: center;
        justify-content: center;
    }

    #output {
        margin-top: 20px;
        white-space: pre-line;
        font-family: monospace;
    }

    input {
        padding: 8px;
        width: 250px;
    }

    button {
        padding: 8px 12px;
        cursor: pointer;
    }

    /* =========================
       PIANO
    ========================= */

    #pianoContainer {
        margin-top: 40px;
    }

    #piano {
        position: relative;
        width: 560px;
        height: 180px;
        margin: 0 auto;
    }

    .whiteKey {
        position: relative;
        width: 80px;
        height: 180px;
        border: 1px solid black;
        background: white;
        box-sizing: border-box;
        float: left;
    }

    .blackKey {
        position: absolute;
        width: 50px;
        height: 110px;
        background: black;
        top: 0;
        z-index: 2;
    }

    .dot {
        position: absolute;
        width: 18px;
        height: 18px;
        background: red;
        border-radius: 50%;
        left: 50%;
        transform: translateX(-50%);
    }

    .whiteDot {
        bottom: 18px;
        z-index: 3;
    }

    .blackDot {
        bottom: 12px;
        background: red;
        z-index: 4;
    }

    .keyLabel {
        position: absolute;
        bottom: 2px;
        width: 100%;
        text-align: center;
        font-size: 12px;
        color: black;
    }

    .blackLabel {
        color: white;
    }

</style>
</head>

<body>

<h2>Interactive Guitar Chord Builder</h2>

<div id="tuningControls">

    <h3>Tuning (low → high)</h3>

    <div class="tuningRow">

        <select class="tuningSelect" data-index="0"></select>
        <select class="tuningSelect" data-index="1"></select>
        <select class="tuningSelect" data-index="2"></select>
        <select class="tuningSelect" data-index="3"></select>
        <select class="tuningSelect" data-index="4"></select>
        <select class="tuningSelect" data-index="5"></select>

    </div>

</div>

<input id="tabInput" placeholder="e.g. x02220">
<button onclick="drawFromInput()">Analyze</button>

<div id="board"></div>

<!-- FRET NUMBERS -->
<div class="markerRow">

    <div></div>

    <div class="marker">0</div>
    <div class="marker">1</div>
    <div class="marker">2</div>
    <div class="marker">3</div>
    <div class="marker">4</div>
    <div class="marker">5</div>
    <div class="marker">6</div>
    <div class="marker">7</div>
    <div class="marker">8</div>
    <div class="marker">9</div>
    <div class="marker">10</div>
    <div class="marker">11</div>
    <div class="marker">12</div>

    <div></div>

</div>

<!-- DOTS -->
<div class="markerRow">

    <div></div>

    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>

    <div class="marker">•</div>

    <div></div>

    <div class="marker">•</div>

    <div></div>

    <div class="marker">•</div>

    <div></div>
    <div></div>

    <div class="marker">••</div>

    <div></div>

</div>

<div id="output">Select at least 3 notes...</div>

<!-- PIANO -->
<div id="pianoContainer">

    <div id="piano">

        <!-- WHITE KEYS -->
        <div class="whiteKey" data-note="C">
            <div class="keyLabel">C</div>
        </div>

        <div class="whiteKey" data-note="D">
            <div class="keyLabel">D</div>
        </div>

        <div class="whiteKey" data-note="E">
            <div class="keyLabel">E</div>
        </div>

        <div class="whiteKey" data-note="F">
            <div class="keyLabel">F</div>
        </div>

        <div class="whiteKey" data-note="G">
            <div class="keyLabel">G</div>
        </div>

        <div class="whiteKey" data-note="A">
            <div class="keyLabel">A</div>
        </div>

        <div class="whiteKey" data-note="B">
            <div class="keyLabel">B</div>
        </div>

        <!-- BLACK KEYS -->
        <div class="blackKey" data-note="C#" style="left:55px;">
            <div class="keyLabel blackLabel">C#</div>
        </div>

        <div class="blackKey" data-note="D#" style="left:135px;">
            <div class="keyLabel blackLabel">D#</div>
        </div>

        <div class="blackKey" data-note="F#" style="left:295px;">
            <div class="keyLabel blackLabel">F#</div>
        </div>

        <div class="blackKey" data-note="G#" style="left:375px;">
            <div class="keyLabel blackLabel">G#</div>
        </div>

        <div class="blackKey" data-note="A#" style="left:455px;">
            <div class="keyLabel blackLabel">A#</div>
        </div>

    </div>

</div>

<script src="./chordsDetector.js"></script>
<script>

// =====================================
// NOTE OPTIONS
// =====================================

const NOTE_OPTIONS = [
    "C","C#","D","D#","E","F",
    "F#","G","G#","A","A#","B"
];

// =====================================
// TUNING
// =====================================

let logicalTuning = ["E","A","D","G","B","E"];

function getDisplayTuning() {
    return [...logicalTuning].reverse();
}

// =====================================
// STATE
// =====================================

let selected = ["x","x","x","x","x","x"];

// THIS is now the SINGLE SOURCE of truth for highlighting
let lastAnalyzedNotes = [];

// =====================================
// BUILD TUNING DROPDOWNS
// =====================================

function buildTuningSelectors() {

    const selects =
        document.querySelectorAll(".tuningSelect");

    selects.forEach((select, index) => {

        select.innerHTML = "";

        NOTE_OPTIONS.forEach(note => {

            const option = document.createElement("option");
            option.value = note;
            option.innerText = note;

            if (note === logicalTuning[index]) {
                option.selected = true;
            }

            select.appendChild(option);
        });

        select.addEventListener("change", () => {

            logicalTuning[index] = select.value;

            buildFretboard();
            updateOutput();
        });
    });
}

// =====================================
// BUILD FRETBOARD
// =====================================

function buildFretboard() {

    const board = document.getElementById("board");
    board.innerHTML = "";

    const displayTuning = getDisplayTuning();

    displayTuning.forEach((openNote, visualStringIndex) => {

        const row = document.createElement("div");
        row.className = "row";

        const label = document.createElement("div");
        label.className = "label";
        label.innerText = openNote;

        const string = document.createElement("div");
        string.className = "string";

        for (let fret = 0; fret <= 12; fret++) {

            const div = document.createElement("div");
            div.className = "fret";

            if (fret === 0) div.classList.add("open");

            const note = window.getNote(openNote, fret);
            div.innerText = note;

            const logicalIndex = 5 - visualStringIndex;

            // restore clicked state
            if (selected[logicalIndex] === String(fret)) {
                div.classList.add("mark");
            }

            div.addEventListener("click", () => {

                Array.from(string.children).forEach(f =>
                    f.classList.remove("mark")
                );

                if (selected[logicalIndex] === String(fret)) {
                    selected[logicalIndex] = "x";
                } else {
                    selected[logicalIndex] = String(fret);
                    div.classList.add("mark");
                }

                updateOutput();
            });

            string.appendChild(div);
        }

        row.appendChild(label);
        row.appendChild(string);

        board.appendChild(row);
    });

    // IMPORTANT: re-apply chord highlight after rebuild
    highlightFretboard(lastAnalyzedNotes);
}

// =====================================
// HIGHLIGHT FRETBOARD FROM NOTES
// =====================================

function highlightFretboard() {

    // clear all highlights
    document.querySelectorAll(".fret").forEach(f =>
        f.classList.remove("mark")
    );

    const displayTuning = getDisplayTuning();

    displayTuning.forEach((openNote, visualIndex) => {

        const logicalIndex = 5 - visualIndex;
        const fret = selected[logicalIndex];

        if (fret === "x") return;

        const stringRow =
            document.querySelectorAll(".row")[visualIndex]
                .querySelector(".string");

        const cell =
            stringRow.children[parseInt(fret)];

        if (cell) {
            cell.classList.add("mark");
        }
    });
}

// =====================================
// PIANO VISUALIZER
// =====================================

function updatePiano(notes) {

    document.querySelectorAll(".dot").forEach(d => d.remove());

    const uniqueNotes = [...new Set(notes)];

    uniqueNotes.forEach(note => {

        const key =
            document.querySelector(`[data-note="${note}"]`);

        if (!key) return;

        const dot = document.createElement("div");
        dot.className = "dot";

        if (key.classList.contains("blackKey")) {
            dot.classList.add("blackDot");
        } else {
            dot.classList.add("whiteDot");
        }

        key.appendChild(dot);
    });
}

// =====================================
// INPUT
// =====================================

function drawFromInput() {

    const input =
        document.getElementById("tabInput").value;

    try {

        const parsed =
            window.parseTab(input);

        selected = [...parsed];

        buildFretboard();
        updateOutput();

    } catch (e) {
        alert(e.message);
    }
}

// =====================================
// OUTPUT (MAIN FIX HERE)
// =====================================

function updateOutput() {

    const output = document.getElementById("output");

    const tab = selected.join(",");

    const notes =
        window.tabToOrderedNotes(tab, logicalTuning);

    // SAVE for UI syncing
    lastAnalyzedNotes = notes;

    // UPDATE BOTH VISUALIZERS
    updatePiano(notes);
    highlightFretboard();

    if (notes.length < 3) {
        output.innerText = "Select at least 3 notes...";
        return;
    }

    const chords =
        window.detectChord(tab, logicalTuning);

    let text =
        "Tab (low → high): " + tab + "\n\n" +
        "Notes (low → high): " + notes.join(" → ") + "\n\n" +
        "Chords:\n";

    chords.slice(0, 5).forEach(c => {
        text += `${c.name} (${c.score.toFixed(2)})\n`;
    });

    output.innerText = text;
}

// =====================================
// INIT
// =====================================

buildTuningSelectors();
buildFretboard();

</script>
