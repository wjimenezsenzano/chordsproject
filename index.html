<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guitar Chord Detector</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 20px;
    }

    h2 { margin-bottom: 10px; }

    #controls { margin-bottom: 10px; }

    #boardWrapper {
        display: inline-block;
        text-align: center;
    }

    #board {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 20px;
    }

    .row {
        display: flex;
        align-items: center;
    }

    .label {
        width: 40px;
        font-weight: bold;
    }

    .rightLabel {
        width: 140px;
        text-align: left;
        margin-left: 10px;
        font-size: 13px;
        color: #555;
    }

    .string {
        display: grid;
        grid-template-columns: repeat(13, 48px);
        gap: 2px;
    }

    .fret {
        border: 1px solid #333;
        padding: 6px;
        cursor: pointer;
        user-select: none;
        font-size: 12px;
    }

    .open { background: #ddd; }

    .markerRow {
        display: grid;
        grid-template-columns: repeat(13, 48px);
        gap: 2px;
        margin-top: 10px;
        justify-content: center;
    }

    .marker {
        font-size: 14px;
        font-weight: bold;
        height: 20px;
    }

    #output {
        margin-top: 20px;
        white-space: pre-line;
        font-family: monospace;
    }

    input {
        padding: 8px;
        width: 260px;
    }

    button {
        padding: 8px 12px;
        cursor: pointer;
        margin-left: 5px;
    }
</style>
</head>

<body>

<h2>Interactive Guitar Chord Builder</h2>

<div id="controls">
    <input id="tabInput" placeholder="x02220 OR E,A,D,G,B,E">
    <button onclick="analyzeChord()">Analyze</button>
    <button onclick="changeTuning()">Change Tuning</button>
</div>

<div id="boardWrapper">
    <div id="board"></div>

    <div class="markerRow">
        <div class="marker">0</div>
        <div class="marker"></div>
        <div class="marker"></div>
        <div class="marker"></div>
        <div class="marker"></div>
        <div class="marker">•</div>
        <div class="marker"></div>
        <div class="marker">•</div>
        <div class="marker"></div>
        <div class="marker">•</div>
        <div class="marker"></div>
        <div class="marker"></div>
        <div class="marker">••</div>
    </div>
</div>

<div id="output">Select at least 3 notes...</div>

<script src="./chordsDetector.js"></script>

<script>

// ==============================
// INDEX RULE:
// 0 = bottom string
// 5 = top string
// ==============================

let displayTuning = ["E","A","D","G","B","E"];
let selected = ["x","x","x","x","x","x"];

// ---------------- BUILD FRETBOARD ----------------
function buildFretboard() {

    const board = document.getElementById("board");
    if (!board) return;

    board.innerHTML = "";

    displayTuning.forEach((openNote, stringIndex) => {

        const row = document.createElement("div");
        row.className = "row";

        const label = document.createElement("div");
        label.className = "label";
        label.innerText = openNote;
        row.appendChild(label);

        const string = document.createElement("div");
        string.className = "string";

        for (let fret = 0; fret <= 12; fret++) {

            const div = document.createElement("div");
            div.className = "fret";

            if (fret === 0) div.classList.add("open");

            div.innerText = window.getNote(openNote, fret);

            div.addEventListener("click", () => {

                if (selected[stringIndex] === String(fret)) {
                    selected[stringIndex] = "x";
                } else {
                    selected[stringIndex] = String(fret);
                }

                renderSelections();
                updateOutput();
            });

            string.appendChild(div);
        }

        row.appendChild(string);

        const rightLabel = document.createElement("div");
        rightLabel.className = "rightLabel";

        if (stringIndex === 0) rightLabel.innerText = "(bottom string)";
        if (stringIndex === 5) rightLabel.innerText = "(top string)";

        row.appendChild(rightLabel);

        board.appendChild(row);
    });

    renderSelections();
}

// ---------------- RENDER STATE ----------------
function renderSelections() {

    const rows = document.querySelectorAll(".string");

    rows.forEach((stringEl, stringIndex) => {

        const frets = Array.from(stringEl.children);
        frets.forEach(f => f.classList.remove("mark"));

        const val = selected[stringIndex];

        if (val !== "x") {
            const fretIndex = parseInt(val);
            if (frets[fretIndex]) {
                frets[fretIndex].classList.add("mark");
            }
        }
    });
}

// ---------------- ANALYZE ----------------
function analyzeChord() {

    const input = document.getElementById("tabInput").value.trim();

    try {
        selected = window.parseTab(input);
        renderSelections();
        updateOutput();
    } catch (e) {
        alert(e.message);
    }
}

// ---------------- CHANGE TUNING ----------------
function changeTuning() {

    const input = document.getElementById("tabInput").value.trim();
    const parts = input.split(",");

    if (parts.length !== 6) {
        alert("Need 6 notes bottom → top");
        return;
    }

    displayTuning = parts.map(n => n.trim().toUpperCase());
    selected = ["x","x","x","x","x","x"];

    buildFretboard();
    updateOutput();
}

// ---------------- OUTPUT ----------------
function updateOutput() {

    const output = document.getElementById("output");
    const tab = selected.join(",");

    const notes = window.tabToOrderedNotes(tab, displayTuning);

    if (notes.length < 3) {
        output.innerText = "Select at least 3 notes...";
        return;
    }

    const chords = window.detectChord(tab, displayTuning);

    let text =
        "Notes (bottom → top): " + notes.join(" → ") + "\n\n" +
        "Chords:\n";

    chords.slice(0, 5).forEach(c => {
        text += `${c.name} (${c.score.toFixed(2)})\n`;
    });

    output.innerText = text;
}

// ---------------- INIT (FIXED DOM ISSUE) ----------------
window.addEventListener("DOMContentLoaded", buildFretboard);

</script>

</body>
</html>
