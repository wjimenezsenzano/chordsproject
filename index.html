<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chord Fretboard</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 30px;
        }

        .row {
            display: flex;
            align-items: center;
        }

        .label {
            width: 40px;
            font-weight: bold;
            text-align: right;
            margin-right: 10px;
        }

        .string {
            display: grid;
            grid-template-columns: repeat(13, 50px);
        }

        .fret {
            border: 1px solid #333;
            padding: 5px;
            cursor: pointer;
            user-select: none;
        }

        .open {
            background: #ddd;
        }

        .mark {
            background: black;
            color: white;
        }

        #output {
            margin-top: 20px;
            font-family: monospace;
            white-space: pre-line;
        }
    </style>
</head>

<body>

<h2>Interactive Guitar Chord Builder</h2>

<div id="board"></div>

<div id="output">Select at least 3 notes...</div>

<script src="chordsDetector.js"></script>

</body>
</html>
