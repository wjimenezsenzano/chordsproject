<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guitar Chord Detector</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 20px;
    }

    h2 {
        margin-bottom: 10px;
    }

    #board {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 20px;
    }

    .row {
        display: flex;
        align-items: center;
    }

    .label {
        width: 40px;
        font-weight: bold;
    }

    .string {
        display: grid;
        grid-template-columns: repeat(13, 50px);
        gap: 2px;
    }

    .fret {
        border: 1px solid #333;
        padding: 6px;
        cursor: pointer;
        user-select: none;
        font-size: 12px;
    }

    .open {
        background: #ddd;
    }

    .mark {
        background: black;
        color: white;
    }

    #output {
        margin-top: 20px;
        white-space: pre-line;
        font-family: monospace;
    }

    input {
        padding: 8px;
        width: 250px;
    }

    button {
        padding: 8px 12px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h2>Interactive Guitar Chord Builder</h2>

<input id="tabInput" placeholder="e.g. x02220">
<button onclick="drawFromInput()">Analyze</button>

<div id="board"></div>

<div id="output">Select at least 3 notes...</div>

<script src="./chordsDetector.js"></script>

<script>

// ---------------- TUNINGS ----------------

// Visual order (top → bottom on screen)
const displayTuning = ["E","B","G","D","A","E"];

// Logical/theory order (low → high)
const logicalTuning = ["E","A","D","G","B","E"];

// ---------------- STATE ----------------

// ALWAYS stored low → high
// [low E, A, D, G, B, high E]
let selected = ["x","x","x","x","x","x"];

// ---------------- BUILD FRETBOARD ----------------

function buildFretboard() {

    const board = document.getElementById("board");

    displayTuning.forEach((openNote, visualStringIndex) => {

        const row = document.createElement("div");
        row.className = "row";

        const label = document.createElement("div");
        label.className = "label";
        label.innerText = openNote;
        row.appendChild(label);

        const string = document.createElement("div");
        string.className = "string";

        for (let fret = 0; fret <= 12; fret++) {

            const div = document.createElement("div");
            div.className = "fret";

            if (fret === 0) {
                div.classList.add("open");
            }

            div.innerText = window.getNote(openNote, fret);

            div.addEventListener("click", () => {

                // Convert visual string index → logical string index
                const logicalIndex = 5 - visualStringIndex;

                // Clear previous selection on THIS visual string
                Array.from(string.children).forEach(f =>
                    f.classList.remove("mark")
                );

                // Toggle OFF if same fret clicked
                if (selected[logicalIndex] == fret.toString()) {

                    selected[logicalIndex] = "x";

                    updateOutput();
                    return;
                }

                // Store fret logically low → high
                selected[logicalIndex] = String(fret);

                div.classList.add("mark");

                updateOutput();
            });

            string.appendChild(div);
        }

        row.appendChild(string);
        board.appendChild(row);
    });
}

// ---------------- GET TAB STRING ----------------

function getTabString() {
    return selected.join(",");
}

// ---------------- UPDATE OUTPUT ----------------

function updateOutput() {

    const output = document.getElementById("output");

    const tab = getTabString();

    const orderedNotes =
        window.tabToOrderedNotes(tab, logicalTuning);

    if (orderedNotes.length < 3) {

        output.innerText = "Select at least 3 notes...";
        return;
    }

    const chords =
        window.detectChord(tab, logicalTuning);

    let text =
        "Tab (low → high): " + tab + "\n\n" +
        "Notes (low → high): " +
        orderedNotes.join(" → ") +
        "\n\n" +
        "Chords:\n";

    chords.slice(0, 5).forEach(c => {
        text += `${c.name} (${c.score.toFixed(2)})\n`;
    });

    output.innerText = text;
}

// ---------------- MANUAL INPUT ----------------

function drawFromInput() {

    const input =
        document.getElementById("tabInput").value;

    try {

        const parsed = window.parseTab(input);

        // Store logically low → high
        selected = [...parsed];

        // Clear UI
        document.querySelectorAll(".fret").forEach(f =>
            f.classList.remove("mark")
        );

        const strings =
            document.querySelectorAll(".string");

        // parsed[] is low → high
        for (let logicalIndex = 0; logicalIndex < 6; logicalIndex++) {

            if (parsed[logicalIndex] === "x") continue;

            const fret = parseInt(parsed[logicalIndex]);

            // Convert logical → visual
            const visualIndex = 5 - logicalIndex;

            const cell =
                strings[visualIndex].children[fret];

            if (cell) {
                cell.classList.add("mark");
            }
        }

        updateOutput();

    } catch (e) {

        alert(e.message);
    }
}

// ---------------- INIT ----------------

buildFretboard();

</script>

</body>
</html>
