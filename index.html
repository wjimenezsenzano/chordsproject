<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guitar Chord Detector</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 20px;
    }

    h2 {
        margin-bottom: 10px;
    }

    /* =========================
       GLOBAL GRID SETTINGS
    ========================= */
    :root {
        --label-width: 40px;
        --fret-width: 50px;
        --gap: 2px;
    }

    /* CENTER WRAPPER */
    #board {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 20px;
        align-items: center;
    }

    .row {
        display: grid;
        grid-template-columns: var(--label-width) repeat(13, var(--fret-width)) 140px;
        gap: var(--gap);
        align-items: center;
    }

    .label {
        font-weight: bold;
        text-align: center;
    }

    .rightLabel {
        text-align: left;
        font-size: 13px;
        color: #555;
    }

    .string {
        display: contents; /* IMPORTANT: makes cells align with row grid */
    }

    .fret {
        width: var(--fret-width);
        height: 28px;
        border: 1px solid #333;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        font-size: 12px;
        box-sizing: border-box;
    }

    .open {
        background: #ddd;
    }

    .mark {
        background: black;
        color: white;
    }

    /* =========================
       MARKER ROW (SAME GRID)
    ========================= */
    .markerRow {
        display: grid;
        grid-template-columns: var(--label-width) repeat(13, var(--fret-width)) 140px;
        gap: var(--gap);
        margin-top: 10px;
        justify-content: center;
    }

    .marker {
        font-size: 12px;
        font-weight: bold;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #output {
        margin-top: 20px;
        white-space: pre-line;
        font-family: monospace;
    }

    input {
        padding: 8px;
        width: 250px;
    }

    button {
        padding: 8px 12px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h2>Interactive Guitar Chord Builder</h2>

<input id="tabInput" placeholder="e.g. x02220">
<button onclick="drawFromInput()">Analyze</button>

<div id="board"></div>

<!-- PERFECTLY ALIGNED MARKERS -->
<div class="markerRow">
    <div></div>
    <div class="marker">0</div>
    <div class="marker">1</div>
    <div class="marker">2</div>
    <div class="marker">3</div>
    <div class="marker">4</div>
    <div class="marker">5</div>
    <div class="marker">6</div>
    <div class="marker">7</div>
    <div class="marker">8</div>
    <div class="marker">9</div>
    <div class="marker">10</div>
    <div class="marker">11</div>
    <div class="marker">12</div>
    <div></div>
</div>

<div id="output">Select at least 3 notes...</div>

<script src="./chordsDetector.js"></script>

<script>

// ---------------- TUNINGS ----------------
const displayTuning = ["E","B","G","D","A","E"];
const logicalTuning = ["E","A","D","G","B","E"];

// ---------------- STATE ----------------
let selected = ["x","x","x","x","x","x"];

// ---------------- BUILD FRETBOARD ----------------
function buildFretboard() {

    const board = document.getElementById("board");

    displayTuning.forEach((openNote, visualStringIndex) => {

        const row = document.createElement("div");
        row.className = "row";

        const label = document.createElement("div");
        label.className = "label";
        label.innerText = openNote;

        const string = document.createElement("div");
        string.className = "string";

        for (let fret = 0; fret <= 12; fret++) {

            const div = document.createElement("div");
            div.className = "fret";

            if (fret === 0) div.classList.add("open");

            div.innerText = window.getNote(openNote, fret);

            div.addEventListener("click", () => {

                const logicalIndex = 5 - visualStringIndex;

                Array.from(string.children).forEach(f =>
                    f.classList.remove("mark")
                );

                if (selected[logicalIndex] == fret.toString()) {
                    selected[logicalIndex] = "x";
                } else {
                    selected[logicalIndex] = String(fret);
                    div.classList.add("mark");
                }

                updateOutput();
            });

            string.appendChild(div);
        }

        const rightLabel = document.createElement("div");
        rightLabel.className = "rightLabel";

        if (visualStringIndex === 0) rightLabel.innerText = "(top string)";
        if (visualStringIndex === 5) rightLabel.innerText = "(bottom string)";

        row.appendChild(label);
        row.appendChild(string);
        row.appendChild(rightLabel);

        board.appendChild(row);
    });
}

// ---------------- INPUT ----------------
function drawFromInput() {

    const input = document.getElementById("tabInput").value;

    try {
        const parsed = window.parseTab(input);

        selected = [...parsed];

        document.querySelectorAll(".fret").forEach(f =>
            f.classList.remove("mark")
        );

        const rows = document.querySelectorAll(".row");

        for (let logicalIndex = 0; logicalIndex < 6; logicalIndex++) {

            if (parsed[logicalIndex] === "x") continue;

            const fret = parseInt(parsed[logicalIndex]);
            const visualIndex = 5 - logicalIndex;

            const string = rows[visualIndex].querySelector(".string");
            const cell = string.children[fret];

            if (cell) cell.classList.add("mark");
        }

        updateOutput();

    } catch (e) {
        alert(e.message);
    }
}

// ---------------- OUTPUT ----------------
function updateOutput() {

    const output = document.getElementById("output");
    const tab = selected.join(",");

    const notes = window.tabToOrderedNotes(tab, logicalTuning);

    if (notes.length < 3) {
        output.innerText = "Select at least 3 notes...";
        return;
    }

    const chords = window.detectChord(tab, logicalTuning);

    let text =
        "Notes (low → high): " + notes.join(" → ") + "\n\n" +
        "Chords:\n";

    chords.slice(0, 5).forEach(c => {
        text += `${c.name} (${c.score.toFixed(2)})\n`;
    });

    output.innerText = text;
}

// ---------------- INIT ----------------
buildFretboard();

</script>

</body>
</html>
