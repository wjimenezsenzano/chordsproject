<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guitar Chord Detector</title>

<style>
    * { box-sizing: border-box; }

    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 20px;
    }

    h2 { margin-bottom: 10px; }

    #controls { margin-bottom: 10px; }

    #boardWrapper {
        display: inline-block;
    }

    #board {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 20px;
    }

    .row {
        display: flex;
        align-items: center;
    }

    .label {
        width: 40px;
        font-weight: bold;
    }

    .rightLabel {
        width: 140px;
        text-align: left;
        margin-left: 10px;
        font-size: 13px;
        color: #555;
    }

    .string,
    .markerRow,
    .numberRow {
        display: grid;
        grid-template-columns: repeat(13, 48px);
    }

    .fret {
        border: 1px solid #333;
        padding: 6px;
        cursor: pointer;
        user-select: none;
        font-size: 12px;
    }

    .open { background: #ddd; }

    .mark {
        background: black;
        color: white;
    }

    .marker, .number {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 18px;
        font-size: 12px;
    }

    #output {
        margin-top: 20px;
        white-space: pre-line;
        font-family: monospace;
    }

    input {
        padding: 8px;
        width: 260px;
    }

    button {
        padding: 8px 12px;
        cursor: pointer;
        margin-left: 5px;
    }
</style>
</head>

<body>

<h2>Interactive Guitar Chord Builder</h2>

<div id="controls">
    <input id="tabInput" placeholder="x02220 OR Cmaj7 OR E,A,D,G,B,E">
    <button onclick="handleInput()">Apply</button>
</div>

<div id="boardWrapper">

    <div id="board"></div>

    <div class="markerRow">
        <div class="marker">0</div>
        <div></div><div></div><div></div><div></div>
        <div class="marker">•</div>
        <div></div>
        <div class="marker">•</div>
        <div></div>
        <div class="marker">•</div>
        <div></div><div></div>
        <div class="marker">••</div>
    </div>

    <div class="numberRow">
        <div class="number">0</div><div class="number">1</div><div class="number">2</div>
        <div class="number">3</div><div class="number">4</div><div class="number">5</div>
        <div class="number">6</div><div class="number">7</div><div class="number">8</div>
        <div class="number">9</div><div class="number">10</div><div class="number">11</div>
        <div class="number">12</div>
    </div>

</div>

<div id="output">Enter a chord or tab...</div>

<script src="./chordsDetector.js"></script>

<script>

// ---------------- STATE ----------------
let displayTuning = ["E","B","G","D","A","E"];
let logicalTuning = ["E","A","D","G","B","E"];
let selected = ["x","x","x","x","x","x"];

const notes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

// ---------------- BUILD ----------------
function buildFretboard() {

    const board = document.getElementById("board");
    board.innerHTML = "";

    displayTuning.forEach((openNote, visualIndex) => {

        const row = document.createElement("div");
        row.className = "row";

        const label = document.createElement("div");
        label.className = "label";
        label.innerText = openNote;
        row.appendChild(label);

        const string = document.createElement("div");
        string.className = "string";

        for (let fret = 0; fret <= 12; fret++) {

            const div = document.createElement("div");
            div.className = "fret";

            if (fret === 0) div.classList.add("open");

            div.innerText = window.getNote(openNote, fret);

            div.onclick = () => {
                const i = 5 - visualIndex;

                if (selected[i] == fret) {
                    selected[i] = "x";
                } else {
                    selected[i] = String(fret);
                }

                updateOutput();
            };

            string.appendChild(div);
        }

        row.appendChild(string);

        const right = document.createElement("div");
        right.className = "rightLabel";
        right.innerText =
            visualIndex === 0 ? "(top string)" :
            visualIndex === 5 ? "(bottom string)" : "";

        row.appendChild(right);

        board.appendChild(row);
    });
}

// ---------------- MAIN INPUT HANDLER ----------------
function handleInput() {

    const input = document.getElementById("tabInput").value.trim();

    // CASE 1: TAB INPUT
    if (input.includes("x") || /^[0-9x, ]+$/.test(input)) {

        try {
            selected = window.parseTab(input);
            updateOutput();
            return;
        } catch (e) {
            alert(e.message);
            return;
        }
    }

    // CASE 2: CHORD NAME → generate voicing
    generateChordVoicing(input);
}

// ---------------- CHORD → FRETBOARD ----------------
function generateChordVoicing(chordName) {

    const root = chordName.match(/[A-G]#?/);
    if (!root) {
        alert("Invalid chord name");
        return;
    }

    const rootNote = root[0];
    const rootIndex = notes.indexOf(rootNote);

    // simple heuristic voicing (open position bias)
    const voicing = [];

    for (let i = 0; i < 6; i++) {

        const openNote = displayTuning[i];
        const openIndex = notes.indexOf(openNote);

        let bestFret = "x";

        for (let f = 0; f <= 5; f++) {
            const note = notes[(openIndex + f) % 12];

            if (note === rootNote) {
                bestFret = f;
                break;
            }
        }

        voicing.push(bestFret.toString());
    }

    selected = voicing;

    updateOutput();
}

// ---------------- OUTPUT ----------------
function updateOutput() {

    const tab = selected.join(",");

    const notesOut = window.tabToOrderedNotes(tab, logicalTuning);

    const output = document.getElementById("output");

    if (notesOut.length < 3) {
        output.innerText = "Select at least 3 notes...";
        return;
    }

    const chords = window.detectChord(tab, logicalTuning);

    let text =
        "Notes (low → high): " + notesOut.join(" → ") + "\n\n" +
        "Chords:\n";

    chords.slice(0, 5).forEach(c => {
        text += `${c.name} (${c.score.toFixed(2)})\n`;
    });

    output.innerText = text;

    syncUI();
}

// ---------------- SYNC UI ----------------
function syncUI() {

    const strings = document.querySelectorAll(".string");

    document.querySelectorAll(".fret").forEach(f =>
        f.classList.remove("mark")
    );

    for (let i = 0; i < 6; i++) {

        if (selected[i] === "x") continue;

        const visual = 5 - i;
        const fret = parseInt(selected[i]);

        const cell = strings[visual].children[fret];

        if (cell) cell.classList.add("mark");
    }
}

// ---------------- INIT ----------------
buildFretboard();

</script>

</body>
</html>
